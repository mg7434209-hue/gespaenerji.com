name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/determined-albattani-ol20qb
      - claude/confident-dirac-om5h20
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir yayın çalışsın
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build multilingual pages (/en, /de, /ru)
        run: node build.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
